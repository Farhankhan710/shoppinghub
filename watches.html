<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Hub - Premium Watches</title>
    <style>
        @keyframes pageFadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f6fa; color: #2c3e50; }
        .main-header { background-color: #ffffff; padding: 20px 15px; text-align: center; border-bottom: 3px solid #3498db; }
        .brand-logo { display: inline-flex; align-items: center; justify-content: center; animation: pageFadeUp 0.8s ease forwards; }
        .brand-logo span { font-size: 26px; font-weight: 800; color: #2c3e50; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 700px; margin: 0 auto; }
        .resell-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e6f0fa; display: flex; flex-direction: column; justify-content: space-between; }
        .img-box { height: 150px; display: flex; align-items: center; justify-content: center; background: #fff; border-bottom: 1px solid #f0f6fa; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-details { padding: 10px; text-align: left; }
        .product-title { margin: 0 0 4px 0; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price-tag { font-size: 15px; font-weight: 700; color: #2c3e50; margin: 0 0 8px 0; }
        .resell-btn { background-color: #3498db; color: white; border: none; padding: 8px; width: 100%; font-weight: bold; border-radius: 6px; font-size: 12px; }
        .back-home-btn { display: inline-block; background: #2c3e50; color: white !important; text-decoration: none; padding: 12px 25px; font-size: 13px; font-weight: bold; border-radius: 30px; margin: 30px auto; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="brand-logo"><span>Premium <span style="color: #3498db;">Watches</span></span></div>
    </header>
    <div style="text-align: center; padding: 20px 0 5px 0;">
        <h2 style="margin:0; font-size: 20px;">All Watches</h2>
        <p style="color:#7f8c8d; margin: 4px 0 0 0; font-size: 13px;">Explore our unlimited collection</p>
    </div>
    <main class="products-grid">
        <div class="resell-card"><div class="img-box"><img src="watch1.jpg"></div><div class="card-details"><h3 class="product-title">Black Matte Watch</h3><p class="price-tag">₹999</p><button class="resell-btn">Order Now</button></div></div>
        <div class="resell-card"><div class="img-box"><img src="watch2.jpg"></div><div class="card-details"><h3 class="product-title">Luxury Metal Watch</h3><p class="price-tag">₹1,499</p><button class="resell-btn">Order Now</button></div></div>
        <div class="resell-card"><div class="img-box"><img src="watch3.jpg"></div><div class="card-details"><h3 class="product-title">Smart Fitness Watch</h3><p class="price-tag">₹1,999</p><button class="resell-btn">Order Now</button></div></div>
        <div class="resell-card"><div class="img-box"><img src="watch4.jpg"></div><div class="card-details"><h3 class="product-title">Sports Digital Watch</h3><p class="price-tag">₹799</p><button class="resell-btn">Order Now</button></div></div>
        </main>
    <div style="text-align: center;"><a href="./index.html" class="back-home-btn">← Back To Home</a></div>
</body>
</html>
